<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DNS Agent Routing - Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1a;color:#e0e0e0;font-family:'Segoe UI',system-ui,sans-serif;padding:20px;min-height:100vh}
h1{font-size:1.3rem;margin-bottom:4px;color:#c0c0c0;font-weight:400}
.subtitle{color:#666;font-size:0.8rem;margin-bottom:16px}
.panels{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px}
@media(max-width:1100px){.panels{grid-template-columns:1fr}}
.panel{background:#1a1a2e;border-radius:10px;border:1px solid #2a2a4a;display:flex;flex-direction:column;height:500px}
.panel-header{padding:10px 14px;border-bottom:1px solid #2a2a4a;display:flex;justify-content:space-between;align-items:center}
.panel-header .name{font-weight:600;font-size:0.95rem;color:#d0d0d0}
.panel-header .status{font-size:0.75rem;padding:2px 8px;border-radius:10px}
.status.online{background:#1a4a2a;color:#6ae08a}
.status.offline{background:#4a1a1a;color:#e06a6a}
.panel-capabilities{font-size:0.7rem;color:#666;padding:2px 14px;border-bottom:1px solid #1a1a2e}
.panel-body{flex:1;overflow-y:auto;padding:8px 10px;font-size:0.8rem}
.panel-body .log-entry{padding:4px 0;border-bottom:1px solid #1a1a2e;line-height:1.4}
.log-entry .time{color:#555;font-size:0.7rem}
.log-entry .action{display:inline-block;padding:0 6px;border-radius:3px;font-size:0.7rem;font-weight:600;margin:0 4px}
.action.KNOWLEDGE_HIT{background:#1a3a2a;color:#6ae08a}
.action.LLM_CALL,.action.LLM_RESPONSE{background:#2a2a4a;color:#8a8aff}
.action.ROUTED{background:#3a2a1a;color:#e0b06a}
.action.BROADCAST_OK{background:#1a2a3a;color:#6aafe0}
.action.NOT_FOUND,.action.TTL_EXPIRED{background:#4a1a1a;color:#e06a6a}
.log-entry .detail{color:#aaa;font-size:0.75rem}
.log-entry .query-text{color:#888;font-size:0.75rem}
.log-entry .log-result{color:#8ac;font-size:0.7rem;padding:2px 6px;margin-top:2px;background:#0f0f1a;border-radius:3px;border-left:2px solid #3a5a7a}
.panel-footer{font-size:0.7rem;padding:6px 14px;border-top:1px solid #2a2a4a;color:#666;max-height:80px;overflow-y:auto}
.panel-footer .rt-entry{display:flex;justify-content:space-between;padding:1px 0}
.panel-footer .rt-entry .rt-prefix{color:#888}
.panel-footer .rt-entry .rt-target{color:#6ae08a}
.panel-footer .rt-entry .rt-conf{color:#e0b06a}
.query-bar{display:flex;gap:8px;margin-bottom:16px}
.query-bar input{flex:1;padding:10px 14px;border-radius:8px;border:1px solid #3a3a5a;background:#1a1a2e;color:#e0e0e0;font-size:0.95rem}
.query-bar input::placeholder{color:#555}
.query-bar input:focus{outline:none;border-color:#6a8aff}
.query-bar button{padding:10px 24px;border-radius:8px;border:none;background:#3a4a7a;color:#e0e0e0;cursor:pointer;font-size:0.9rem}
.query-bar button:hover{background:#4a5a8a}
.query-bar button:disabled{opacity:0.3;cursor:not-allowed}
#response-box{margin-bottom:16px}
#response-box .resp-text{background:#1a1a2e;border:1px solid #2a4a2a;border-radius:8px;padding:12px;font-size:0.9rem;line-height:1.5;color:#c0e0c0}
#response-box .resp-meta{font-size:0.75rem;color:#666;margin-top:6px}
#response-box .resp-route{font-size:0.8rem;color:#888;margin-top:4px}
#response-box .resp-route .step{display:inline-block;padding:1px 6px;border-radius:3px;margin:1px;font-size:0.7rem}
.resp-route .step.request{background:#2a2a4a;color:#888}
.resp-route .step.forward{background:#3a2a4a;color:#b8a0ff}
.resp-route .step.author{background:#1a3a2a;color:#6ae08a}
.empty-state{color:#444;font-size:0.8rem;text-align:center;padding:20px}
.network-bar{display:flex;gap:6px;font-size:0.75rem;margin-bottom:12px;color:#888}
.network-bar .node{display:flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;background:#1a1a2e;border:1px solid #2a2a4a}
.network-bar .node .dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.dot.on{background:#6ae08a}.dot.off{background:#e06a6a}
</style>
</head>
<body>

<h1>DNS Agent Routing</h1>
<p class="subtitle">三位一体 完全分散P2P エージェントルーティング検証</p>

<div class="network-bar" id="network-bar"></div>

<div class="query-bar">
  <input type="text" id="query-input" placeholder="例: knowledge/kuma/secrets/meeting_20260720" list="suggestions">
  <datalist id="suggestions">
    <option value="knowledge/kuma/secrets/meeting_20260720">
    <option value="knowledge/secrets/password">
    <option value="knowledge/common/greeting">
    <option value="knowledge/general/what is dns">
  </datalist>
  <button id="query-btn" onclick="sendQuery()">送信</button>
</div>

<div id="response-box"></div>

<div class="panels" id="panels"></div>

<script>
const AGENTS = [
  { id: 'A', port: 8001, color: '#6a8aff', caps: ['knowledge/mtdnot/', 'knowledge/general/'] },
  { id: 'B', port: 8002, color: '#e0b06a', caps: ['knowledge/common/', 'knowledge/general/'] },
  { id: 'C', port: 8003, color: '#6ae08a', caps: ['knowledge/secrets/', 'knowledge/kuma/'] },
];

const A_API = window.location.origin;
let agentData = {};

async function refreshAll() {
  try {
    const resp = await fetch(A_API + '/api/health/all');
    if (resp.ok) {
      const all = await resp.json();
      for (const a of AGENTS) agentData[a.id] = all[a.id] || null;
    }
  } catch { for (const a of AGENTS) agentData[a.id] = null; }
  renderPanels();
  renderNetworkBar();
}

function renderNetworkBar() {
  const bar = document.getElementById('network-bar');
  bar.innerHTML = AGENTS.map(a => {
    const d = agentData[a.id];
    const on = d !== null && d !== undefined;
    return `<span class="node"><span class="dot ${on ? 'on' : 'off'}"></span>${a.id}${on ? ' (' + (d.acquaintances||[]).join(',') + ')' : ' offline'}</span>`;
  }).join(' ');
}

function renderPanels() {
  const container = document.getElementById('panels');
  container.innerHTML = AGENTS.map(a => {
    const d = agentData[a.id];
    const on = d !== null && d !== undefined;
    
    let logHtml = '<div class="empty-state">クエリを送信するとここに処理履歴が表示されます</div>';
    let routingHtml = '';
    let capsHtml = '';
    
    if (on) {
      capsHtml = a.caps.join(' ');
      if (d.routing_table && Object.keys(d.routing_table).length > 0) {
        routingHtml = Object.entries(d.routing_table).slice(0,3).map(([p, e]) =>
          `<div class="rt-entry"><span class="rt-prefix">${p.length>22?p.slice(0,20)+'..':p}</span><span class="rt-target">${e.target}</span><span class="rt-conf">${e.confidence.toFixed(3)}</span></div>`
        ).join('');
      } else {
        routingHtml = '<div style="color:#555">(empty)</div>';
      }
      
      // fetch query_log for this agent
      fetch(A_API + '/api/trace/all').then(r => r.json()).then(data => {
        const log = (data[a.id] && data[a.id].log) || [];
        updateAgentLog(a.id, log);
      }).catch(() => {});
    }
    
    return `
      <div class="panel" id="panel-${a.id}" style="border-color:${a.color}44">
        <div class="panel-header">
          <span class="name" style="color:${a.color}">Agent ${a.id}</span>
          <span class="status ${on ? 'online' : 'offline'}">${on ? 'online' : 'offline'}</span>
        </div>
        <div class="panel-capabilities">${on ? capsHtml : '-'}</div>
        <div class="panel-body" id="log-${a.id}">
          <div class="empty-state">クエリを送信するとここに処理履歴が表示されます</div>
        </div>
        <div class="panel-footer">
          <div style="font-size:0.7rem;color:#888;margin-bottom:2px">routing table:</div>
          ${routingHtml}
        </div>
      </div>
    `;
  }).join('');
}

function updateAgentLog(agentId, log) {
  const el = document.getElementById('log-' + agentId);
  if (!el) return;
  if (!log || log.length === 0) {
    el.innerHTML = '<div class="empty-state">処理履歴なし</div>';
    return;
  }
  el.innerHTML = log.map(e => {
    const act = (e.action || '').replace(/[^a-zA-Z0-9_]/g, '');
    const result = e.result || '';
    const hasResult = result.length > 0 && act !== 'NOT_FOUND';
    return `<div class="log-entry">
      <span class="time">${e.time || ''}</span>
      <span class="action ${act}">${e.action || ''}</span>
      <span class="detail">${e.detail || ''}</span>
      <div class="query-text">${(e.query || '').length > 40 ? (e.query || '').slice(0,38)+'..' : (e.query || '')}</div>
      ${hasResult ? `<div class="log-result">${result.length > 100 ? result.slice(0,100)+'...' : result}</div>` : ''}
    </div>`;
  }).join('');
}

async function sendQuery() {
  const input = document.getElementById('query-input');
  const query = input.value.trim();
  if (!query) return;
  
  const btn = document.getElementById('query-btn');
  btn.disabled = true; btn.textContent = '送信中...';
  document.getElementById('response-box').innerHTML = '';
  
  try {
    const resp = await fetch(A_API + '/a2a/message', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({type:'query',sender:'A',recipient:'A',query,ttl:5,
        provenance:[{"agent":"A","role":"request"}]})
    });
    const result = await resp.json();
    displayResponse(query, result);
    // fetch trace from all agents
    setTimeout(() => refreshTrace(), 300);
  } catch(e) {
    document.getElementById('response-box').innerHTML =
      '<div class="resp-text" style="border-color:#4a2a2a;color:#e06a6a">通信エラー: ' + e.message + '</div>';
  }
  
  btn.disabled = false; btn.textContent = '送信';
}

function refreshTrace() {
  fetch(A_API + '/api/trace/all').then(r => r.json()).then(data => {
    for (const a of AGENTS) {
      const log = (data[a.id] && data[a.id].log) || [];
      updateAgentLog(a.id, log);
    }
  }).catch(() => {});
  refreshAll();
}

function displayResponse(query, result) {
  const box = document.getElementById('response-box');
  const isError = result.type === 'error';
  const provenance = result.provenance || [];
  
  let routeHtml = '';
  if (provenance.length > 0) {
    routeHtml = provenance.map(p => {
      const cls = p.role === 'author' ? 'author' : p.role === 'forward' ? 'forward' : 'request';
      return `<span class="step ${cls}">${p.agent}(${p.role})</span>`;
    }).join(' → ');
  }
  
  box.innerHTML = `
    <div class="resp-text" style="border-color:${isError ? '#4a2a2a' : '#2a4a2a'}">
      ${isError ? '' : ''} ${result.text || '(empty)'}
    </div>
    <div class="resp-route">${routeHtml}</div>
    <div class="resp-meta">query: ${query}</div>
  `;
}

refreshAll();
setInterval(refreshAll, 5000);
</script>
</body>
</html>
